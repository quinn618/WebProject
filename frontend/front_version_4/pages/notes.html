<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>My Notes – Ghassra Core</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/shared.css?v=1" />
    <link rel="stylesheet" href="../assets/css/notes.css?v=1" />
    <script src="../assets/js/api.js?v=20260420" defer></script>
    <script src="../assets/js/shared.js?v=20260420" defer></script>
    <script src="../assets/js/notes.js?v=20260420" defer></script>
  </head>
  <body>
    <!-- TopNavBar -->
    <nav class="topnav">
      <div class="topnav-left">
        <a class="brand" href="#">Ghassra Core</a>
        <div class="topnav-links">
          <a href="main.html">Resources</a>
        </div>
      </div>
      <div class="topnav-right">
        <button class="plus-btn" aria-label="Upload new note">
          <span class="material-symbols-outlined">add</span>
        </button>
        <button class="icon-btn" aria-label="Notifications">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <div class="avatar-sm">
          <img src="../assets/images/student avatar.jpg" alt="Student avatar" />
        </div>
      </div>
    </nav>

    <!-- SideNavBar -->
    <aside class="sidenav">
      <nav>
        <a href="profile.html">
          <span class="material-symbols-outlined">account_circle</span>
          <span>Profile</span>
        </a>
        <a href="#" class="active">
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >description</span
          >
          <span>My Notes</span>
        </a>
        <a href="earnings.html">
          <span class="material-symbols-outlined">payments</span>
          <span>Earnings</span>
        </a>
        <a href="downloads.html">
          <span class="material-symbols-outlined">download</span>
          <span>Downloads</span>
        </a>
        <a href="#" class="logout" onclick="confirmLogout(event)">
          <span class="material-symbols-outlined">logout</span>
          <span>Logout</span>
        </a>
      </nav>
      <div class="sidenav-footer">
        <div class="sold-card" onclick="openSoldModal()">
          <div class="sold-card-icon">
            <span class="material-symbols-outlined">shopping_cart</span>
          </div>
          <h4 id="soldCount">28</h4>
          <p>My Sold</p>
        </div>
        <button class="upload-btn-sidebar">Upload New Note</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main>
      <div class="page-header">
        <h1>My Notes</h1>
        <p>Your archive of every document you've studied or shared.</p>
      </div>

      <div class="search-bar-large">
        <span
          class="material-symbols-outlined"
          style="color: var(--primary); font-size: 1.5rem"
          >search</span
        >
        <input
          id="searchInput"
          placeholder="Search through titles, topics, or types..."
          type="text"
        />
      </div>

      <div class="cards-grid" id="notesGrid"></div>

      <div class="empty-state" id="emptyState" style="display: none">
        <span class="material-symbols-outlined">search_off</span>
        <p>No notes match your search.</p>
      </div>
    </main>
  </body>
</html>
