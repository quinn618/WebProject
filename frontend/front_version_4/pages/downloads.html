      </div>
      <div class="topnav-right">
        <button class="icon-btn" aria-label="Notifications">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <div class="avatar-sm">
          <img src="../assets/images/student avatar.jpg" alt="Student avatar" />
        </div>
      </div>
    </nav>

    <aside class="sidenav">
      <nav>
        <a href="profile.html"
          ><span class="material-symbols-outlined">account_circle</span
          ><span>Profile</span></a
        >
        <a href="notes.html"
          ><span class="material-symbols-outlined">description</span
          ><span>My Notes</span></a
        >
        <a href="earnings.html"
          ><span class="material-symbols-outlined">payments</span
          ><span>Earnings</span></a
        >
        <a href="#" class="active"

            style="font-variation-settings: &quot;FILL&quot; 1"

          ><span>Downloads</span></a
        >
        <a href="#" class="logout" onclick="confirmLogout(event)"

          ><span>Logout</span></a

        />

      <div class="section-header">
        <span class="material-symbols-outlined" style="color: var(--primary)"
          >history</span
        >
        <h2>Your Downloads</h2>
        <span class="section-count">0 files</span>
      </div>
      <div class="items-list"></div>

  <script>
    // Protect this page - redirect to login if not authenticated
    if (!requireAuth()) {
      // requireAuth() will redirect
    } else {
      // Load downloads data when authenticated
      initNavbar();
      loadDownloads();
      refreshSoldCount();
    }
